<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS v4.1 LIVE</title>

<style>
body {
  background:#020408;
  color:#00ff9f;
  font-family: monospace;
  margin:0;
}

.header {
  padding:10px;
  border-bottom:1px solid #0a1a2a;
  display:flex;
  justify-content:space-between;
}

.status { color:#ff4455; }
.status.live { color:#00ff9f; }

.container {
  padding:10px;
}

canvas {
  width:100%;
  height:200px;
  background:#000;
  border:1px solid #0a1a2a;
}

.row {
  display:flex;
  gap:10px;
  margin-top:10px;
}

.box {
  flex:1;
  background:#060c12;
  padding:10px;
  border:1px solid #0a1a2a;
  height:200px;
  overflow:auto;
}

.green { color:#00ff9f }
.red { color:#ff4455 }
</style>
</head>

<body>

<div class="header">
  <div>NEXUS v4.1 LIVE ENGINE</div>
  <div id="wsStatus" class="status">OFFLINE</div>
</div>

<div class="container">

<canvas id="chart"></canvas>

<div class="row">
  <div class="box">
    <b>OrderBook</b>
    <div id="orderbook"></div>
  </div>

  <div class="box">
    <b>Signals</b>
    <div id="signals"></div>
  </div>

  <div class="box">
    <b>Logs</b>
    <div id="logs"></div>
  </div>
</div>

</div>

<script>
let wsKline, wsDepth;
let candles = [];
let bids = [], asks = [];

const log = (msg) => {
  const el = document.createElement("div");
  el.textContent = msg;
  document.getElementById("logs").prepend(el);
};

function setStatus(on){
  const el = document.getElementById("wsStatus");
  el.textContent = on ? "LIVE" : "OFFLINE";
  el.className = "status " + (on ? "live" : "");
}

function connect(){

  wsKline = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@kline_1m");
  wsDepth = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@depth");

  wsKline.onopen = () => {
    setStatus(true);
    log("Kline connected");
  };

  wsKline.onmessage = (e) => {
    const k = JSON.parse(e.data).k;

    const c = {
      o:+k.o,
      h:+k.h,
      l:+k.l,
      c:+k.c
    };

    candles.push(c);
    if(candles.length>100) candles.shift();

    draw();
    strategy();
  };

  wsDepth.onmessage = (e) => {
    const d = JSON.parse(e.data);
    bids = d.b || [];
    asks = d.a || [];

    renderOB();
  };

  wsKline.onclose = reconnect;
  wsDepth.onclose = reconnect;
}

function reconnect(){
  setStatus(false);
  log("Reconnecting...");
  setTimeout(connect,3000);
}

/* ===== CHART ===== */
function draw(){
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(candles.length<2) return;

  const prices = candles.map(c=>c.c);
  const max = Math.max(...prices);
  const min = Math.min(...prices);

  candles.forEach((c,i)=>{
    const x = i * (canvas.width / candles.length);
    const y = canvas.height - ((c.c-min)/(max-min))*canvas.height;

    ctx.fillStyle = "#00ff9f";
    ctx.fillRect(x,y,3,3);
  });
}

/* ===== ORDERBOOK ===== */
function renderOB(){
  const el = document.getElementById("orderbook");
  el.innerHTML = "";

  bids.slice(0,5).forEach(b=>{
    const d = document.createElement("div");
    d.innerHTML = `<span class="green">${b[0]}</span> | ${b[1]}`;
    el.appendChild(d);
  });

  asks.slice(0,5).forEach(a=>{
    const d = document.createElement("div");
    d.innerHTML = `<span class="red">${a[0]}</span> | ${a[1]}`;
    el.appendChild(d);
  });
}

/* ===== STRATEGY ===== */
function strategy(){
  if(candles.length<10) return;

  const closes = candles.map(c=>c.c);

  const avg = closes.slice(-10).reduce((a,b)=>a+b,0)/10;
  const last = closes[closes.length-1];

  const signalBox = document.getElementById("signals");

  if(last > avg){
    addSignal("LONG", last);
  } else {
    addSignal("SHORT", last);
  }
}

let lastSignal = 0;

function addSignal(type, price){
  if(Date.now() - lastSignal < 5000) return;
  lastSignal = Date.now();

  const el = document.createElement("div");
  el.innerHTML = `${type} @ ${price}`;

  el.className = type==="LONG" ? "green" : "red";

  document.getElementById("signals").prepend(el);
}

/* START */
connect();
</script>

</body>
</html>
