<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS v3.3.5 | THE FINAL</title>
    <style>
        :root {
            --g: #d4af37;
            --bg: #050505;
            --s: #00ff9f;
            --a: #00d4ff;
            --e: #ff4444;
            --panel: #0a0a0a;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--g);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
        }

        ._0x_frame {
            border: 2px solid var(--g);
            padding: 15px;
            max-width: 1300px;
            margin: auto;
            min-height: 95vh;
            transition: border-color 0.5s;
            position: relative;
        }

        ._0x_frame.bullish { border-color: var(--s); box-shadow: 0 0 15px rgba(0,255,159,0.15); }
        ._0x_frame.bearish { border-color: var(--e); box-shadow: 0 0 15px rgba(255,68,68,0.15); }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        ._grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        @media (min-width: 768px) { ._grid { grid-template-columns: repeat(4, 1fr); } }

        ._card {
            background: var(--panel);
            border: 1px solid #222;
            padding: 10px;
            text-align: center;
        }

        ._val {
            display: block;
            font-size: 1.1rem;
            color: #fff;
            text-shadow: 0 0 5px var(--g);
            margin: 5px 0;
        }

        ._view {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 768px) { ._view { grid-template-columns: 1fr 2.2fr; } }

        ._panel {
            border: 1px solid #222;
            background: #000;
            padding: 12px;
            height: 350px;
            overflow-y: auto;
        }

        .btn {
            background: #111;
            border: 1px solid var(--g);
            color: var(--g);
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.7rem;
            margin: 2px;
            transition: background 0.2s;
        }

        .btn:hover, .btn.active {
            background: var(--g);
            color: #000;
        }

        #_feed {
            font-size: 0.65rem;
            color: var(--a);
            line-height: 1.6;
            text-align: left;
            direction: ltr;
        }

        .label {
            color: #555;
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            background: #000;
            color: var(--a);
            border: 1px solid #333;
            font-size: 0.75rem;
            text-align: center;
            width: 85%;
            padding: 4px;
            margin-top: 5px;
        }

        .win-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            border-bottom: 1px solid #111;
            padding: 4px 0;
            color: var(--s);
        }

        .win-row.bearish-row { color: var(--e); }

        /* إصلاح: تأثيرات بصرية للإشارات */
        .signal-badge {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 2px;
            font-size: 0.55rem;
        }
        .signal-bull { background: rgba(0,255,159,0.15); color: var(--s); border: 1px solid var(--s); }
        .signal-bear { background: rgba(255,68,68,0.15); color: var(--e); border: 1px solid var(--e); }

        /* إصلاح: مؤشر تحميل */
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    </style>
</head>
<body>

<div class="_0x_frame" id="nx_core">
    <header>
        <div>
            <h2 style="margin:0; font-size: 1.1rem;">⚔️ NEXUS v3.3.5 | THE FINAL</h2>
            <div style="margin-top:8px;">
                <button class="btn active" id="btn_btc" onclick="svc('BTCUSDT','BTC/USD','btn_btc')">BTC</button>
                <button class="btn" id="btn_eth" onclick="svc('ETHUSDT','ETH/USD','btn_eth')">ETH</button>
                <button class="btn" id="btn_gold" onclick="svc('PAXGUSDT','GOLD/USD','btn_gold')">GOLD</button>
            </div>
        </div>
        <div style="text-align:left; font-size: 0.6rem; direction: ltr;">
            <div>ARCHITECT: <span style="color:var(--g)">CHAKIR</span></div>
            <div>STATUS: <span id="conn_status" style="color:var(--e)" class="blink">CONNECTING</span></div>
            <div style="color:#333; margin-top:3px;" id="last_update">--:--:--</div>
        </div>
    </header>

    <div class="_grid">
        <!-- بطاقة الثقة -->
        <div class="_card">
            <span class="label">Confidence Score</span>
            <span class="_val" id="cv">---</span>
            <div id="strat_advice" style="font-size:0.5rem; color:var(--s)">[ANALYZING]</div>
        </div>

        <!-- بطاقة إدارة المخاطر - إصلاح: منع القيم السالبة -->
        <div class="_card" style="border-color: var(--a);">
            <span class="label">Risk Manager</span>
            <input type="number" id="balance" placeholder="Capital $" min="1" oninput="runRisk()">
            <div id="risk_result" style="font-size:0.5rem; color:var(--g); margin-top:3px;">Balance Required</div>
        </div>

        <!-- بطاقة السعر الحالي -->
        <div class="_card">
            <span class="label">Market Pulse</span>
            <span class="_val" id="cp">LOADING</span>
            <small id="an" style="color:#555;">BTC/USD</small>
        </div>

        <!-- بطاقة الهدف - إصلاح: حساب الهدف بشكل صحيح -->
        <div class="_card">
            <span class="label">AI Target</span>
            <span class="_val" id="pt" style="color:var(--a)">---</span>
            <small style="color:#555;">SMA_MODEL</small>
        </div>
    </div>

    <div class="_view">
        <!-- لوحة الإشارات -->
        <div class="_panel">
            <div class="label" style="margin-bottom:10px;">🏆 Proven Signals</div>
            <div id="win_ledger"></div>
        </div>

        <!-- لوحة السجل -->
        <div class="_panel">
            <div class="label" style="margin-bottom:10px;">System Logic Feed</div>
            <div id="_feed" dir="ltr">>> Initializing Sovereign Core <<</div>
        </div>
    </div>
</div>

<script>
(function(){
    'use strict';

    // ===== الإصلاح الرئيسي: متغيرات منفصلة لكل أصل =====
    const ASSETS = {
        'BTCUSDT': { hist: [], lastPrice: 0, label: 'BTC/USD' },
        'ETHUSDT': { hist: [], lastPrice: 0, label: 'ETH/USD' },
        'PAXGUSDT': { hist: [], lastPrice: 0, label: 'GOLD/USD' }
    };

    let currentAsset = 'BTCUSDT';
    let currentBtn = 'btn_btc';
    let engineTimer = null;
    let isRunning = false;

    // ===== إصلاح: حدود أسعار منطقية للتحقق من صحة البيانات =====
    const PRICE_GUARDS = {
        'BTCUSDT':  { min: 10000,  max: 500000 },
        'ETHUSDT':  { min: 100,    max: 50000  },
        'PAXGUSDT': { min: 1000,   max: 10000  }
    };

    // ===== إصلاح: التحقق من صحة السعر (Critic Agent) =====
    function validatePrice(symbol, price) {
        const guard = PRICE_GUARDS[symbol];
        if (!guard) return false;
        if (isNaN(price) || price <= 0) {
            log(`[CRITIC] ⚠️ Invalid price rejected: ${price}`, '#ff4444');
            return false;
        }
        if (price < guard.min || price > guard.max) {
            log(`[CRITIC] 🛡️ Anomaly detected! Price ${price} out of range [${guard.min}-${guard.max}]`, '#ff4444');
            return false;
        }
        return true;
    }

    // ===== إصلاح: حساب SMA صحيح =====
    function calcSMA(prices) {
        if (!prices || prices.length === 0) return 0;
        const sum = prices.reduce((a, b) => a + b, 0);
        return sum / prices.length;
    }

    // ===== إصلاح: حساب الهدف بناءً على SMA الفعلي وليس قيمة عشوائية =====
    function calcTarget(hist, currentPrice) {
        if (hist.length < 2) return currentPrice;
        const sma = calcSMA(hist);
        // الهدف = السعر + (فرق السعر عن المتوسط * معامل الزخم)
        const diff = currentPrice - sma;
        const momentum = diff * 0.3;
        const target = currentPrice + momentum;
        // التأكد من أن الهدف إيجابي ومنطقي
        return Math.max(target, currentPrice * 0.9);
    }

    // ===== إصلاح: حساب الثقة بناءً على استقرار السعر =====
    function calcConfidence(hist, currentPrice) {
        if (hist.length < 3) return 85;
        const sma = calcSMA(hist);
        const distances = hist.map(p => Math.abs(p - sma) / sma * 100);
        const avgDist = calcSMA(distances);
        // كلما كان السعر أقرب للمتوسط، كلما زادت الثقة
        const conf = Math.max(75, Math.min(99, Math.round(98 - avgDist * 10)));
        return conf;
    }

    // ===== محرك جلب البيانات =====
    async function engine() {
        if (isRunning) return;
        isRunning = true;

        try {
            const res = await fetch(
                `https://api.binance.com/api/v3/ticker/price?symbol=${currentAsset}`,
                { cache: 'no-cache' }
            );

            if (!res.ok) throw new Error(`HTTP ${res.status}`);

            const data = await res.json();
            const rawPrice = parseFloat(data.price);

            // ===== تشغيل Critic Agent للتحقق =====
            if (!validatePrice(currentAsset, rawPrice)) {
                log(`[EXECUTOR] Price rejected by Critic. Retrying...`, '#ff4444');
                isRunning = false;
                return;
            }

            const asset = ASSETS[currentAsset];
            asset.lastPrice = rawPrice;
            asset.hist.push(rawPrice);
            if (asset.hist.length > 20) asset.hist.shift(); // نافذة أكبر للدقة

            // تحديث الواجهة
            document.getElementById('conn_status').textContent = 'SECURE';
            document.getElementById('conn_status').style.color = 'var(--s)';
            document.getElementById('conn_status').classList.remove('blink');
            document.getElementById('cp').textContent = rawPrice.toLocaleString('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });

            // تحديث الوقت
            const now = new Date();
            document.getElementById('last_update').textContent =
                now.toLocaleTimeString('en-GB');

            analyze(rawPrice, asset.hist);
            runRisk();

        } catch (e) {
            document.getElementById('conn_status').textContent = 'OFFLINE';
            document.getElementById('conn_status').style.color = 'var(--e)';
            document.getElementById('conn_status').classList.add('blink');
            log(`[!] Connection Error: ${e.message}`, '#ff4444');
        } finally {
            isRunning = false;
        }
    }

    // ===== تحليل البيانات =====
    function analyze(price, hist) {
        const target = calcTarget(hist, price);
        const conf = calcConfidence(hist, price);
        const prevPrice = hist.length >= 2 ? hist[hist.length - 2] : price;
        const change = price - prevPrice;

        // ===== إصلاح: التحقق من صحة الهدف قبل العرض =====
        if (!validatePrice(currentAsset, target)) {
            log(`[CRITIC] Target anomaly prevented: ${target.toFixed(2)}`, '#ff4444');
            return;
        }

        document.getElementById('pt').textContent = target.toFixed(2);
        document.getElementById('cv').textContent = conf + '%';

        const ad = document.getElementById('strat_advice');
        const core = document.getElementById('nx_core');

        if (change > 0) {
            ad.textContent = '[BULLISH_SIGNAL]';
            ad.style.color = 'var(--s)';
            core.className = '_0x_frame bullish';
            if (conf >= 90) addSignal('Bullish Pivot', price, true);
        } else if (change < 0) {
            ad.textContent = '[BEARISH_PRESSURE]';
            ad.style.color = 'var(--e)';
            core.className = '_0x_frame bearish';
            if (conf >= 90) addSignal('Bearish Alert', price, false);
        } else {
            ad.textContent = '[NEUTRAL_ZONE]';
            ad.style.color = 'var(--g)';
            core.className = '_0x_frame';
        }

        log(`[PLANNER] Price: ${price.toFixed(2)} | Target: ${target.toFixed(2)} | Conf: ${conf}%`, '#00d4ff');
    }

    // ===== إضافة إشارة للسجل =====
    function addSignal(type, price, isBull) {
        const ledger = document.getElementById('win_ledger');
        const row = document.createElement('div');
        row.className = 'win-row' + (isBull ? '' : ' bearish-row');
        const badge = isBull ? 'signal-bull' : 'signal-bear';
        const icon = isBull ? '🏆' : '⚠️';
        row.innerHTML = `
            <span>${icon} <span class="signal-badge ${badge}">${type}</span></span>
            <span>@ ${price.toLocaleString('en-US', {maximumFractionDigits: 0})}</span>
        `;
        ledger.prepend(row);
        if (ledger.childNodes.length > 8) ledger.lastChild.remove();
    }

    // ===== إصلاح: حساب إدارة المخاطر مع التحقق من القيم =====
    window.runRisk = () => {
        const balInput = document.getElementById('balance').value;
        const b = parseFloat(balInput);
        const asset = ASSETS[currentAsset];
        const lp = asset.lastPrice;

        if (b > 0 && lp > 0) {
            const riskAmount = b * 0.01;           // 1% من رأس المال
            const slPrice = lp * 0.98;             // وقف خسارة 2%
            const slDiff = lp - slPrice;           // الفرق الإيجابي دائماً

            // ===== إصلاح: منع القسمة على صفر والقيم السالبة =====
            if (slDiff <= 0) {
                document.getElementById('risk_result').innerHTML = 'Calculating...';
                return;
            }

            const size = riskAmount / slDiff;

            document.getElementById('risk_result').innerHTML =
                `Size: ${size.toFixed(4)} | SL: ${slPrice.toLocaleString('en-US', {maximumFractionDigits: 0})}`;
        }
    };

    // ===== تبديل الأصل =====
    window.svc = (symbol, label, btnId) => {
        currentAsset = symbol;
        document.getElementById('an').textContent = label;

        // تحديث الأزرار
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        document.getElementById(btnId).classList.add('active');

        // إعادة تعيين الواجهة
        document.getElementById('cp').textContent = 'LOADING';
        document.getElementById('pt').textContent = '---';
        document.getElementById('cv').textContent = '---';
        document.getElementById('strat_advice').textContent = '[SWITCHING]';
        document.getElementById('risk_result').textContent = 'Balance Required';
        document.getElementById('balance').value = '';
        document.getElementById('nx_core').className = '_0x_frame';

        log(`[!] Switching to: ${symbol}`, '#d4af37');
        engine();
    };

    // ===== تسجيل الأحداث =====
    function log(msg, color) {
        const feed = document.getElementById('_feed');
        const div = document.createElement('div');
        div.style.color = color || '#00d4ff';
        div.style.direction = 'ltr';
        div.textContent = `>> ${msg}`;
        feed.prepend(div);
        // إبقاء السجل في حجم معقول
        while (feed.childNodes.length > 50) feed.lastChild.remove();
    }

    // ===== التشغيل =====
    log('[NEXUS] Sovereign Core Initialized ✓', '#d4af37');
    log('[CRITIC] Price validation layer: ACTIVE', '#00ff9f');
    log('[PLANNER] Awaiting market data...', '#00d4ff');

    engine();
    engineTimer = setInterval(engine, 3000);

})();
</script>
</body>
    </html>
