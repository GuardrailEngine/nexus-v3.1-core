<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS MARKET LAB v3</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

/* ─────────────────────────
   DARK MODE (DEFAULT)
   ───────────────────────── */
:root {
  --bg:#020608;
  --bg2:#060d12;
  --bg3:#0a1520;

  --green:#00ff9f;
  --green2:#00cc7a;
  --red:#ff2d55;
  --yellow:#ffd60a;
  --blue:#0af;

  --text:#c8ffe8;
  --muted:rgba(200,255,232,0.35);

  --border:rgba(0,255,159,0.15);
  --card:#060d12;

  --font:'Share Tech Mono';
  --head:'Orbitron';
}

/* ─────────────────────────
   LIGHT MODE (FIXED)
   ───────────────────────── */
body.light {
  --bg:#f4f7fb;
  --bg2:#ffffff;
  --bg3:#e6ecf2;

  --green:#00a86b;
  --green2:#008f5a;
  --red:#d62839;
  --yellow:#e09f00;
  --blue:#3a86ff;

  --text:#0a0f14;
  --muted:rgba(10,15,20,0.55);

  --border:rgba(0,0,0,0.15);
  --card:#ffffff;
}

/* GLOBAL */
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  transition:0.3s;
}

/* HEADER */
.hdr{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
}

.logo{
  font-family:var(--head);
  color:var(--green);
  letter-spacing:4px;
}

.hdr-right{
  display:flex;
  gap:10px;
}

/* THEME BUTTON */
#themeToggle{
  background:none;
  border:1px solid var(--border);
  color:var(--text);
  padding:4px 10px;
  cursor:pointer;
}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border)}

.tab{
  flex:1;
  padding:12px;
  text-align:center;
  cursor:pointer;
  color:var(--muted);
}

.tab.active{
  color:var(--green);
  background:var(--bg3);
}

/* MAIN */
.main{
  max-width:900px;
  margin:auto;
  padding:14px;
  display:grid;
  gap:14px;
}

/* CARDS (FIXED) */
.signal-hero,
.chart-wrap,
.panel,
.stat {
  background:var(--card);
  border:1px solid var(--border);
}

/* HERO */
.signal-hero{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.hero-signal{
  font-family:var(--head);
  font-size:1.5rem;
}

.hero-price{
  font-size:1.6rem;
  color:var(--green);
}

/* CHART */
.chart-wrap{
  padding:10px;
}

.tf-btn{
  padding:4px 8px;
  border:1px solid var(--border);
  background:none;
  color:var(--muted);
  cursor:pointer;
}

.tf-btn.active{
  color:var(--green);
  border-color:var(--green);
}

/* STATS */
.stats-row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

.stat{
  padding:10px;
  text-align:center;
}

/* PANEL */
.panel{
  padding:14px;
}

.panel-title{
  font-family:var(--head);
  font-size:0.7rem;
  margin-bottom:10px;
}

/* STATUS */
.status-bar{
  padding:10px;
  border-top:1px solid var(--border);
  font-size:0.6rem;
  display:flex;
  justify-content:space-between;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="hdr">
  <div class="logo">NEXUS</div>
  <div class="hdr-right">
    <button id="themeToggle">🌙</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchAsset('BTCUSDT',this)">BTC</div>
  <div class="tab" onclick="switchAsset('ETHUSDT',this)">ETH</div>
  <div class="tab" onclick="switchAsset('SOLUSDT',this)">SOL</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="signal-hero">
  <div>
    <div>AI SIGNAL</div>
    <div class="hero-signal" id="heroSignal">LOADING</div>
  </div>
  <div>
    <div class="hero-price" id="heroPrice">$—</div>
  </div>
</div>

<div class="chart-wrap">
  <button class="tf-btn active" onclick="setTF('1m',this)">1M</button>
  <button class="tf-btn" onclick="setTF('5m',this)">5M</button>
  <canvas id="chart"></canvas>
</div>

<div class="stats-row">
  <div class="stat"><div>TREND</div><div id="sTrend">—</div></div>
  <div class="stat"><div>RSI</div><div id="sRsi">—</div></div>
  <div class="stat"><div>MOM</div><div id="sMom">—</div></div>
  <div class="stat"><div>VOL</div><div id="sVol">—</div></div>
</div>

<div class="panel">
  <div class="panel-title">HISTORY</div>
  <div id="histList"></div>
</div>

</div>

<div class="status-bar">
  <span>BINANCE</span>
  <span id="lastUpdate">—</span>
</div>

<script>

/* THEME SYSTEM */
const btn = document.getElementById("themeToggle");

if(localStorage.getItem("theme")==="light"){
  document.body.classList.add("light");
  btn.textContent="☀️";
}

btn.onclick=()=>{
  document.body.classList.toggle("light");
  const light=document.body.classList.contains("light");
  btn.textContent=light?"☀️":"🌙";
  localStorage.setItem("theme",light?"light":"dark");
};

/* BASIC DEMO */
function switchAsset(a,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

function setTF(tf,el){
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

setInterval(()=>{
  document.getElementById('heroPrice').innerText="$"+(Math.random()*50000).toFixed(0);
  document.getElementById('heroSignal').innerText=["BUY","SELL","NEUTRAL"][Math.floor(Math.random()*3)];
},1500);

</script>

</body>
</html>
