<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEXUS LAB v2</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#020408;color:#00ff9f;font-family:'Courier New',monospace}
.container{max-width:1200px;margin:0 auto;padding:20px}
h3{color:#00ff9f;text-shadow:0 0 5px #00ff9f33;margin:0 0 15px 0}
.asset-buttons{display:flex;gap:10px;margin-bottom:20px}
.asset-buttons button{background:#0a1a2a;color:#00ff9f;border:1px solid #00ff9f44;
padding:8px 20px;cursor:pointer;font-family:monospace;font-weight:bold;
transition:all 0.2s}
.asset-buttons button:hover{background:#00ff9f22;border-color:#00ff9f;box-shadow:0 0 8px #00ff9f33}
.chart-container{background:#000;border:1px solid #00ff9f33;padding:10px;margin-bottom:20px}
canvas{display:block;width:100%;height:auto;background:#000}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:20px}
.stat-card{background:#0a1a2a22;border:1px solid #00ff9f33;padding:12px;text-align:center}
.stat-label{font-size:11px;color:#00ff9f88;text-transform:uppercase;letter-spacing:1px}
.stat-value{font-size:24px;font-weight:bold;margin-top:5px;word-break:break-all}
.signal-HIGH_PROB_BUY{color:#00ffaa;text-shadow:0 0 5px #00ffaa88}
.signal-HIGH_PROB_SELL{color:#ff3366;text-shadow:0 0 5px #ff336688}
.signal-RISKY_MARKET{color:#ffaa33}
.signal-NEUTRAL{color:#888}
.status-LOADING{color:#ffaa33;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
</style>
</head>

<body>
<div class="container">

<h3>🏗️ NEXUS MARKET LAB v2 — LIVE SIGNALS</h3>

<div class="asset-buttons">
<button onclick="setAsset('BTCUSDT')">₿ BTC</button>
<button onclick="setAsset('ETHUSDT')">Ξ ETH</button>
<button onclick="setAsset('SOLUSDT')">◎ SOL</button>
</div>

<div class="chart-container">
<canvas id="chart" width="800" height="300" style="width:100%;height:auto;max-width:800px"></canvas>
</div>

<div class="stats-grid">
<div class="stat-card"><div class="stat-label">ASSET</div><div class="stat-value" id="asset">—</div></div>
<div class="stat-card"><div class="stat-label">PRICE (USDT)</div><div class="stat-value" id="price">—</div></div>
<div class="stat-card"><div class="stat-label">TREND</div><div class="stat-value" id="trend">—</div></div>
<div class="stat-card"><div class="stat-label">AI SIGNAL</div><div class="stat-value" id="signal">—</div></div>
</div>

<div class="stats-grid" style="margin-top:10px">
<div class="stat-card"><div class="stat-label">MOMENTUM</div><div class="stat-value" id="momentum">—</div></div>
<div class="stat-card"><div class="stat-label">VOLATILITY</div><div class="stat-value" id="volatility">—</div></div>
</div>

</div>

<script>
const ws = new WebSocket("ws://localhost:3000");

let currentAsset = "BTCUSDT";
let priceHistory = { BTCUSDT: [], ETHUSDT: [], SOLUSDT: [] };
let charts = {};

// Initialize canvas for each asset (lazy)
function getCanvasForAsset(asset) {
    if (!charts[asset]) {
        const canvas = document.getElementById("chart");
        canvas.width = 800;
        canvas.height = 300;
        charts[asset] = {
            ctx: canvas.getContext("2d"),
            canvas: canvas
        };
    }
    return charts[asset];
}

function setAsset(asset) {
    currentAsset = asset;
    // Redraw with current asset's history
    drawChart(asset);
}

function drawChart(asset) {
    const { ctx, canvas } = getCanvasForAsset(asset);
    const history = priceHistory[asset] || [];
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (history.length < 2) {
        ctx.fillStyle = "#00ff9f44";
        ctx.font = "12px monospace";
        ctx.fillText("Loading data...", 10, 30);
        return;
    }
    
    // Find min/max for scaling
    const prices = history.slice(-100);
    const minPrice = Math.min(...prices);
    const maxPrice = Math.max(...prices);
    const range = maxPrice - minPrice || 1;
    
    // Draw grid
    ctx.strokeStyle = "#00ff9f22";
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= 4; i++) {
        const y = canvas.height - (i * canvas.height / 4);
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
    
    // Draw price line
    ctx.beginPath();
    ctx.strokeStyle = "#00ff9f";
    ctx.lineWidth = 2;
    
    let firstPoint = true;
    prices.forEach((price, idx) => {
        const x = (idx / (prices.length - 1)) * canvas.width;
        const y = canvas.height - ((price - minPrice) / range) * (canvas.height - 40) - 20;
        
        if (firstPoint) {
            ctx.moveTo(x, y);
            firstPoint = false;
        } else {
            ctx.lineTo(x, y);
        }
    });
    ctx.stroke();
    
    // Draw gradient fill
    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, "#00ff9f22");
    gradient.addColorStop(1, "#00ff9f00");
    ctx.lineTo(canvas.width, canvas.height);
    ctx.lineTo(0, canvas.height);
    ctx.fillStyle = gradient;
    ctx.fill();
    
    // Draw latest price label
    if (prices.length > 0) {
        const lastPrice = prices[prices.length - 1];
        const lastX = canvas.width - 10;
        const lastY = canvas.height - ((lastPrice - minPrice) / range) * (canvas.height - 40) - 20;
        ctx.fillStyle = "#00ff9f";
        ctx.font = "10px monospace";
        ctx.fillText(`$${lastPrice.toFixed(2)}`, lastX - 50, lastY - 5);
    }
}

ws.onmessage = (event) => {
    const d = JSON.parse(event.data);
    
    // Store price history
    if (!priceHistory[d.asset]) priceHistory[d.asset] = [];
    priceHistory[d.asset].push(d.price);
    if (priceHistory[d.asset].length > 200) priceHistory[d.asset].shift();
    
    // Update UI for current asset
    if (d.asset === currentAsset) {
        document.getElementById("asset").innerHTML = d.asset;
        document.getElementById("price").innerHTML = `$${d.price.toFixed(2)}`;
        document.getElementById("trend").innerHTML = d.analysis.trend;
        document.getElementById("momentum").innerHTML = d.analysis.momentum;
        document.getElementById("volatility").innerHTML = (parseFloat(d.analysis.volatility) * 100).toFixed(2) + "%";
        
        const signalEl = document.getElementById("signal");
        signalEl.innerHTML = d.analysis.signal;
        signalEl.className = `stat-value signal-${d.analysis.signal.replace(/[^A-Z_]/g, '')}`;
        
        drawChart(currentAsset);
    }
};

ws.onopen = () => {
    console.log("🔌 Connected to Nexus Market Lab");
    document.getElementById("asset").innerHTML = "CONNECTED";
};

ws.onerror = (err) => {
    console.error("WebSocket error:", err);
    document.getElementById("asset").innerHTML = "ERROR";
};

ws.onclose = () => {
    document.getElementById("asset").innerHTML = "DISCONNECTED";
};
</script>

</body>
</html>
