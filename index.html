<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS v4.0 | CANDLESTICK EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #d4af37; --cyan: #00d4ff; --green: #00ff9f; --red: #ff4455; --bg: #020408; --panel: #060c12; --border: #0a1a2a; --text: #c8d8e8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; }
.wrapper { max-width: 1400px; margin: auto; padding: 12px; position: relative; z-index: 1; }
.nx-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--panel); border: 1px solid var(--border); border-top: 2px solid var(--gold); margin-bottom: 10px; }
.nx-title { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; background: linear-gradient(135deg, var(--gold), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 10px; }
@media (min-width: 768px) { .cards-grid { grid-template-columns: repeat(4, 1fr); } }
.nx-card { background: var(--panel); border: 1px solid var(--border); padding: 12px; text-align: center; }
.card-label { font-size: 0.5rem; color: #334455; text-transform: uppercase; margin-bottom: 5px; }
.card-value { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: #eee; }
/* تصميم حاوية الشموع اليابانية */
.chart-container { background: #000; border: 1px solid var(--border); padding: 10px; margin-bottom: 15px; position: relative; height: 200px; }
#candleCanvas { width: 100%; height: 100%; display: block; }
.nx-panel { background: var(--panel); border: 1px solid var(--border); padding: 10px; height: 250px; overflow-y: auto; font-size: 0.6rem; }
.sig-bull { color: var(--green); } .sig-bear { color: var(--red); }
.stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 10px; }
.stat-box { background: var(--panel); border: 1px solid var(--border); padding: 5px; text-align: center; font-size: 0.7rem; }
.abtn { background: #000; border: 1px solid var(--border); color: #445566; padding: 4px 10px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.6rem; }
.abtn.active { border-color: var(--gold); color: var(--gold); }
</style>
</head>
<body>

<div class="wrapper">
  <div class="stats-bar">
    <div class="stat-box"><div style="color:var(--gold)" id="stat_signals">0</div><div>Signals</div></div>
    <div class="stat-box"><div style="color:var(--green)" id="stat_bull">0</div><div>Bull</div></div>
    <div class="stat-box"><div style="color:var(--red)" id="stat_bear">0</div><div>Bear</div></div>
    <div class="stat-box"><div style="color:var(--cyan)" id="stat_acc">--</div><div>Conf</div></div>
  </div>

  <div class="nx-header">
    <div class="nx-title">NEXUS v4.0 | CANDLESTICK ENGINE</div>
    <div>
      <button class="abtn active" onclick="switchAsset('BTCUSDT')">BTC</button>
      <button class="abtn" onclick="switchAsset('ETHUSDT')">ETH</button>
    </div>
  </div>

  <div class="cards-grid">
    <div class="nx-card"><div class="card-label">AI Target</div><div class="card-value" id="v_target">---</div></div>
    <div class="nx-card"><div class="card-label">Market Pulse</div><div class="card-value" id="v_price">LOADING</div></div>
    <div class="nx-card"><div class="card-label">Confidence</div><div class="card-value" id="v_conf" style="color:var(--green)">---</div></div>
    <div class="nx-card"><div class="card-label">Architect</div><div class="card-value" style="color:var(--gold)">CHAKIR</div></div>
  </div>

  <div class="chart-container">
    <canvas id="candleCanvas"></canvas>
  </div>

  <div style="display:grid; grid-template-columns: 1fr 1.5fr; gap:10px;">
    <div class="nx-panel"><div>PROVEN SIGNALS</div><div id="sig_list"></div></div>
    <div class="nx-panel"><div>LOG FEED</div><div id="log_list" style="direction:ltr"></div></div>
  </div>
</div>

<script>
(function(){
  'use strict';
  let cur = 'BTCUSDT', candles = [], stats = {t:0, bu:0, be:0, cS:0, cC:0}, busy = false;
  const canvas = document.getElementById('candleCanvas');
  const ctx = canvas.getContext('2d');

  function sysLog(m, c) {
    const l = document.getElementById('log_list'), d = document.createElement('div');
    d.style.color = c || '#00d4ff'; d.textContent = `> ${m}`;
    l.prepend(d); if(l.childNodes.length > 20) l.lastChild.remove();
  }

  function addSignal(type, price, isBull, conf) {
    const l = document.getElementById('sig_list'), r = document.createElement('div');
    r.style.padding = '5px 0'; r.style.borderBottom = '1px solid #0a1a2a';
    r.innerHTML = `<span class="${isBull?'sig-bull':'sig-bear'}">${isBull?'▲':'▼'} ${type}</span> | $${price.toLocaleString()} | ${conf}%`;
    l.prepend(r);
    stats.t++; if(isBull) stats.bu++; else stats.be++;
    stats.cS += conf; stats.cC++;
    document.getElementById('stat_signals').textContent = stats.t;
    document.getElementById('stat_bull').textContent = stats.bu;
    document.getElementById('stat_bear').textContent = stats.be;
    document.getElementById('stat_acc').textContent = Math.round(stats.cS/stats.cC)+'%';
  }

  function drawCandles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (candles.length < 2) return;
    const w = canvas.width, h = canvas.height;
    const maxP = Math.max(...candles.map(c => c.h)), minP = Math.min(...candles.map(c => c.l));
    const range = maxP - minP, candleW = (w / candles.length) * 0.8;

    candles.forEach((c, i) => {
      const x = (i * (w / candles.length)) + (candleW * 0.1);
      const getY = (p) => h - ((p - minP) / range) * h;
      const openY = getY(c.o), closeY = getY(c.c), highY = getY(c.h), lowY = getY(c.l);
      
      ctx.strokeStyle = c.c >= c.o ? '#00ff9f' : '#ff4455';
      ctx.beginPath(); ctx.moveTo(x + candleW/2, highY); ctx.lineTo(x + candleW/2, lowY); ctx.stroke();
      ctx.fillStyle = c.c >= c.o ? '#00ff9f' : '#ff4455';
      ctx.fillRect(x, Math.min(openY, closeY), candleW, Math.abs(openY - closeY) || 1);
    });
  }

  async function tick() {
    if(busy) return; busy = true;
    try {
      const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${cur}&interval=1m&limit=30`);
      const data = await res.json();
      candles = data.map(d => ({ o: parseFloat(d[1]), h: parseFloat(d[2]), l: parseFloat(d[3]), c: parseFloat(d[4]) }));
      
      const last = candles[candles.length-1];
      document.getElementById('v_price').textContent = last.c.toLocaleString();
      const target = last.c + (last.c - candles[0].o) * 0.2;
      const conf = Math.max(80, Math.min(99, 95 + (last.c > last.o ? 2 : -2)));
      
      document.getElementById('v_target').textContent = target.toFixed(2);
      document.getElementById('v_conf').textContent = conf + '%';
      
      canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
      drawCandles();

      if(last.c > last.o && conf >= 90) addSignal("Candle Bull", last.c, true, conf);
      sysLog(`Tick updated: ${last.c}`, '#00ff9f');
    } catch(e) { sysLog("Stream Error", "#ff4455"); } finally { busy = false; }
  }

  window.switchAsset = (s) => { cur = s; tick(); };
  setInterval(tick, 5000); tick();
})();
</script>
</body>
</html>
