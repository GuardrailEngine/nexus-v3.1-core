<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS MARKET LAB v3</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

/* ─────────────────────────────────────────────
   🌙 DARK MODE (DEFAULT)
   ───────────────────────────────────────────── */
:root {
  --bg:#020608;
  --bg2:#060d12;
  --bg3:#0a1520;

  --green:#00ff9f;
  --green2:#00cc7a;
  --red:#ff2d55;
  --yellow:#ffd60a;
  --blue:#0af;

  --text:#c8ffe8;
  --muted:rgba(200,255,232,0.35);
  --border:rgba(0,255,159,0.15);
  --glass:rgba(255,255,255,0.02);

  --font:'Share Tech Mono';
  --head:'Orbitron';
}

/* 🌞 LIGHT MODE */
body.light {
  --bg:#f4f7fb;
  --bg2:#ffffff;
  --bg3:#e9eef5;

  --green:#00b86b;
  --green2:#009e5c;
  --red:#e63946;
  --yellow:#ffb703;
  --blue:#3a86ff;

  --text:#0a0f14;
  --muted:rgba(0,0,0,0.4);
  --border:rgba(0,0,0,0.1);
  --glass:rgba(255,255,255,0.6);
}

/* GLOBAL */
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:
    radial-gradient(circle at 20% 30%, rgba(0,255,159,0.05), transparent),
    radial-gradient(circle at 80% 70%, rgba(0,170,255,0.05), transparent),
    var(--bg);

  color:var(--text);
  font-family:var(--font);
  transition:background 0.3s,color 0.3s;
}

/* HEADER */
.hdr{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(10px);
}

.logo{
  font-family:var(--head);
  color:var(--green);
  letter-spacing:4px;
  text-shadow:0 0 15px var(--green);
}

.hdr-right{
  display:flex;
  gap:10px;
  align-items:center;
}

/* THEME BUTTON */
#themeToggle{
  background:none;
  border:1px solid var(--border);
  color:var(--text);
  padding:4px 10px;
  cursor:pointer;
  font-size:0.8rem;
  transition:0.2s;
}
#themeToggle:hover{
  background:rgba(0,255,159,0.1);
}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border)}

.tab{
  flex:1;
  padding:12px;
  text-align:center;
  cursor:pointer;
  color:var(--muted);
  transition:0.3s;
}

.tab.active{
  color:var(--green);
  background:rgba(0,255,159,0.08);
}

/* MAIN */
.main{
  max-width:900px;
  margin:auto;
  padding:14px;
  display:grid;
  gap:14px;
}

/* HERO */
.signal-hero{
  display:flex;
  justify-content:space-between;
  padding:20px;
  border:1px solid var(--border);
  background:var(--glass);
  backdrop-filter:blur(12px);
}

.hero-signal{
  font-family:var(--head);
  font-size:1.7rem;
  animation:glow 2s infinite;
}

@keyframes glow{
  0%,100%{text-shadow:0 0 10px currentColor}
  50%{text-shadow:0 0 25px currentColor}
}

.hero-price{
  font-size:1.8rem;
  color:var(--green);
}

/* CHART */
.chart-wrap{
  border:1px solid var(--border);
  padding:10px;
  background:var(--glass);
}

.tf-btn{
  padding:4px 8px;
  border:1px solid var(--border);
  background:none;
  color:var(--muted);
  cursor:pointer;
}

.tf-btn.active{
  color:var(--green);
  border-color:var(--green);
}

/* STATS */
.stats-row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

.stat{
  border:1px solid var(--border);
  padding:10px;
  text-align:center;
  background:var(--glass);
  transition:0.3s;
}

.stat:hover{
  transform:translateY(-3px);
}

/* PANEL */
.panel{
  border:1px solid var(--border);
  padding:14px;
  background:var(--glass);
}

.panel-title{
  font-family:var(--head);
  font-size:0.7rem;
  margin-bottom:10px;
}

/* HISTORY */
.hist-item{
  padding:6px;
  border-bottom:1px solid var(--border);
}

/* STATUS */
.status-bar{
  padding:10px;
  border-top:1px solid var(--border);
  font-size:0.6rem;
  display:flex;
  justify-content:space-between;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="hdr">
  <div class="logo">NEXUS</div>

  <div class="hdr-right">
    <button id="themeToggle">🌙</button>
    <div id="countdown">—</div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchAsset('BTCUSDT',this)">BTC</div>
  <div class="tab" onclick="switchAsset('ETHUSDT',this)">ETH</div>
  <div class="tab" onclick="switchAsset('SOLUSDT',this)">SOL</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="signal-hero">
  <div>
    <div>AI SIGNAL</div>
    <div class="hero-signal" id="heroSignal">LOADING</div>
  </div>
  <div>
    <div class="hero-price" id="heroPrice">$—</div>
  </div>
</div>

<div class="chart-wrap">
  <button class="tf-btn active" onclick="setTF('1m',this)">1M</button>
  <button class="tf-btn" onclick="setTF('5m',this)">5M</button>
  <canvas id="chart"></canvas>
</div>

<div class="stats-row">
  <div class="stat"><div>TREND</div><div id="sTrend">—</div></div>
  <div class="stat"><div>RSI</div><div id="sRsi">—</div></div>
  <div class="stat"><div>MOM</div><div id="sMom">—</div></div>
  <div class="stat"><div>VOL</div><div id="sVol">—</div></div>
</div>

<div class="panel">
  <div class="panel-title">HISTORY</div>
  <div id="histList"></div>
</div>

</div>

<!-- STATUS -->
<div class="status-bar">
  <span>BINANCE</span>
  <span id="lastUpdate">—</span>
</div>

<script>

/* ─────────────────────────
   THEME SYSTEM
   ───────────────────────── */
const toggleBtn = document.getElementById("themeToggle");

const savedTheme = localStorage.getItem("theme");

if (savedTheme === "light") {
  document.body.classList.add("light");
  toggleBtn.textContent = "☀️";
} else {
  toggleBtn.textContent = "🌙";
}

toggleBtn.onclick = () => {
  document.body.classList.toggle("light");
  const isLight = document.body.classList.contains("light");
  toggleBtn.textContent = isLight ? "☀️" : "🌙";
  localStorage.setItem("theme", isLight ? "light" : "dark");
};

/* ─────────────────────────
   BASIC LOGIC (MOCK)
   ───────────────────────── */

let currentAsset="BTCUSDT";

function switchAsset(a,el){
  currentAsset=a;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

function setTF(tf,el){
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

/* DEMO DATA */
setInterval(()=>{
  document.getElementById('heroPrice').innerText="$"+(Math.random()*50000).toFixed(0);
  document.getElementById('heroSignal').innerText=["BUY","SELL","NEUTRAL"][Math.floor(Math.random()*3)];
},1500);

</script>

</body>
</html>
