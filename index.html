<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXUS v3.1 – Engineering Sovereignty</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#020608;
            color:#c8ffe8;
            font-family:'Share Tech Mono',monospace;
            padding:20px;
        }
        .card{
            border:1px solid rgba(0,255,159,0.2);
            background:#060d12;
            padding:18px;
            margin-bottom:16px;
            border-radius:4px;
        }
        .title{
            font-family:'Orbitron',monospace;
            font-size:0.7rem;
            letter-spacing:3px;
            color:#00ff9f;
            margin-bottom:12px;
            text-transform:uppercase;
        }
        .flex-row{
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:10px;
        }
        .asset-buttons{
            display:flex;
            gap:12px;
            margin-bottom:20px;
        }
        .asset-btn{
            background:#0a1520;
            border:1px solid rgba(0,255,159,0.3);
            padding:10px 20px;
            font-family:'Orbitron',monospace;
            font-weight:bold;
            cursor:pointer;
            color:#c8ffe8;
            transition:0.2s;
        }
        .asset-btn.active{
            border-color:#00ff9f;
            background:rgba(0,255,159,0.1);
            color:#00ff9f;
            box-shadow:0 0 12px rgba(0,255,159,0.2);
        }
        .signal-box{
            font-size:1.5rem;
            font-weight:bold;
            font-family:'Orbitron',monospace;
            letter-spacing:2px;
        }
        .price{font-size:1.8rem;color:#00ff9f;font-weight:bold}
        .change{font-size:0.8rem;margin-top:5px}
        .up{color:#00ff9f}
        .dn{color:#ff2d55}
        .stats-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
            gap:12px;
            margin:20px 0;
        }
        .stat{
            background:#0a1520;
            padding:12px;
            text-align:center;
            border:1px solid rgba(0,255,159,0.15);
        }
        .stat-label{font-size:0.65rem;color:#9bb5b0;margin-bottom:6px}
        .stat-value{font-size:1rem;font-weight:bold}
        .rsi-bar{height:3px;background:#1a2a2a;margin-top:6px}
        .rsi-fill{height:100%;border-radius:2px}
        .mtf-grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:10px;
            margin-bottom:16px;
        }
        .mtf-card{
            background:#0a1520;
            padding:12px;
            text-align:center;
            border:1px solid rgba(0,255,159,0.2);
        }
        .history-list{
            max-height:180px;
            overflow-y:auto;
            font-size:0.7rem;
        }
        .hist-item{
            display:flex;
            justify-content:space-between;
            padding:6px 0;
            border-bottom:1px solid rgba(0,255,159,0.1);
        }
        .green{color:#00ff9f}
        .red{color:#ff2d55}
        .yellow{color:#ffd60a}
        .status{
            margin-top:20px;
            font-size:0.6rem;
            color:#5f8b85;
            text-align:center;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="title">⚡ NEXUS v3.1 — ENGINEERING SOVEREIGNTY</div>
    <div class="asset-buttons" id="assetButtons">
        <button class="asset-btn active" data-asset="BTCUSDT">₿ BTC</button>
        <button class="asset-btn" data-asset="ETHUSDT">Ξ ETH</button>
        <button class="asset-btn" data-asset="SOLUSDT">◎ SOL</button>
    </div>
    <div class="flex-row">
        <div><div class="title">AI SIGNAL</div><div class="signal-box" id="signal">—</div></div>
        <div style="text-align:right"><div class="price" id="price">$—</div><div class="change" id="change">— %</div></div>
    </div>
</div>

<div class="card">
    <div class="title">📊 METRICS</div>
    <div class="stats-grid">
        <div class="stat"><div class="stat-label">TREND</div><div class="stat-value" id="trend">—</div></div>
        <div class="stat"><div class="stat-label">RSI (14)</div><div class="stat-value" id="rsi">—</div><div class="rsi-bar"><div class="rsi-fill" id="rsiFill" style="width:0%"></div></div></div>
        <div class="stat"><div class="stat-label">MOMENTUM</div><div class="stat-value" id="mom">—</div></div>
        <div class="stat"><div class="stat-label">VOLATILITY</div><div class="stat-value" id="vol">—</div></div>
    </div>
</div>

<div class="card">
    <div class="title">🕒 MULTI-TIMEFRAME ANALYSIS (1m / 5m / 15m)</div>
    <div class="mtf-grid" id="mtfGrid"></div>
    <div style="text-align:right; font-size:0.7rem">refresh: <span id="countdown">3</span>s</div>
</div>

<div class="card">
    <div class="title">📜 SIGNAL HISTORY</div>
    <div class="history-list" id="historyList"><div style="text-align:center">—</div></div>
</div>

<div class="status">
    <span>🟢 BINANCE LIVE API</span> &nbsp;|&nbsp; <span id="lastUpdate">—</span> &nbsp;|&nbsp; <span>0 dependencies • 3x faster</span>
</div>

<script>
    // ═══════════════════════════════════════════════
    //  INDICATORS
    // ═══════════════════════════════════════════════
    function calcEMA(prices, period) {
        if (prices.length < period) return null;
        const k = 2 / (period + 1);
        let ema = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;
        for (let i = period; i < prices.length; i++) {
            ema = prices[i] * k + ema * (1 - k);
        }
        return ema;
    }

    function calcRSI(prices, period = 14) {
        if (prices.length < period + 1) return 50;
        let gains = 0, losses = 0;
        for (let i = prices.length - period; i < prices.length; i++) {
            const diff = prices[i] - prices[i - 1];
            if (diff >= 0) gains += diff;
            else losses -= diff;
        }
        const avgGain = gains / period;
        const avgLoss = losses / period;
        if (avgLoss === 0) return 100;
        const rs = avgGain / avgLoss;
        return 100 - (100 / (1 + rs));
    }

    function calcVolatility(prices, period = 20) {
        if (prices.length < period) return null;
        const slice = prices.slice(-period);
        const mean = slice.reduce((a, b) => a + b, 0) / period;
        const variance = slice.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / period;
        return Math.sqrt(variance) / mean;
    }

    function analyzeMarket(prices) {
        if (!prices || prices.length < 30) return null;
        const ema9 = calcEMA(prices, 9);
        const ema21 = calcEMA(prices, 21);
        const rsi = calcRSI(prices, 14);
        const vol = calcVolatility(prices, 20);
        
        let score = 0;
        if (rsi !== null) {
            if (rsi <= 30) score += 35;
            else if (rsi <= 40) score += 15;
            else if (rsi >= 70) score -= 35;
            else if (rsi >= 60) score -= 15;
        }
        if (ema9 && ema21) {
            if (ema9 > ema21) score += 30;
            else score -= 30;
        }
        
        let signal = "NEUTRAL";
        if (score >= 60) signal = "HIGH_PROB_BUY";
        else if (score >= 25) signal = "BUY";
        else if (score <= -60) signal = "HIGH_PROB_SELL";
        else if (score <= -25) signal = "SELL";
        
        const trend = (ema9 && ema21) ? (ema9 > ema21 ? "BULLISH" : "BEARISH") : "NEUTRAL";
        const momentum = prices.length > 5 ? ((prices[prices.length-1] - prices[prices.length-6]) / prices[prices.length-6]) * 100 : 0;
        
        return { signal, score, trend, rsi, momentum, volatility: vol ? vol * 100 : null };
    }

    // ═══════════════════════════════════════════════
    //  API
    // ═══════════════════════════════════════════════
    async function fetchKlines(symbol, interval = "1m", limit = 80) {
        const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
        const res = await fetch(url);
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error("Invalid klines");
        return data.map(k => parseFloat(k[4]));
    }

    async function fetchTicker(symbol) {
        const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`);
        const data = await res.json();
        return {
            price: parseFloat(data.lastPrice),
            change: parseFloat(data.priceChangePercent),
            volume: parseFloat(data.quoteVolume)
        };
    }

    // ═══════════════════════════════════════════════
    //  UI UPDATES
    // ═══════════════════════════════════════════════
    let currentAsset = "BTCUSDT";
    let historySignals = [];
    let countdownValue = 3;
    let intervalId = null;

    async function updateDashboard() {
        try {
            const ticker = await fetchTicker(currentAsset);
            const closes = await fetchKlines(currentAsset, "1m", 60);
            const analysis = analyzeMarket(closes);
            
            // price & signal
            document.getElementById("price").innerText = `$${ticker.price.toFixed(2)}`;
            const changeHtml = `<span class="${ticker.change >= 0 ? "up" : "dn"}">${ticker.change >= 0 ? "+" : ""}${ticker.change.toFixed(2)}%</span>`;
            document.getElementById("change").innerHTML = changeHtml;
            
            const signalEl = document.getElementById("signal");
            let signalText = analysis?.signal || "NEUTRAL";
            signalEl.innerText = signalText;
            signalEl.style.color = signalText.includes("BUY") ? "#00ff9f" : (signalText.includes("SELL") ? "#ff2d55" : "#c8ffe8");
            
            // stats
            document.getElementById("trend").innerText = analysis?.trend || "—";
            document.getElementById("trend").style.color = analysis?.trend === "BULLISH" ? "#00ff9f" : (analysis?.trend === "BEARISH" ? "#ff2d55" : "#c8ffe8");
            
            const rsiVal = analysis?.rsi || 50;
            document.getElementById("rsi").innerText = Math.round(rsiVal);
            const rsiFill = document.getElementById("rsiFill");
            rsiFill.style.width = `${rsiVal}%`;
            rsiFill.style.backgroundColor = rsiVal > 70 ? "#ff2d55" : (rsiVal < 30 ? "#00ff9f" : "#ffd60a");
            
            const momVal = analysis?.momentum || 0;
            document.getElementById("mom").innerHTML = momVal.toFixed(1) + "%";
            document.getElementById("mom").style.color = momVal >= 0 ? "#00ff9f" : "#ff2d55";
            
            const volVal = analysis?.volatility || 0;
            document.getElementById("vol").innerHTML = volVal.toFixed(2) + "%";
            
            // multi-timeframe
            const tfs = ["1m", "5m", "15m"];
            let mtfHtml = "";
            for (let tf of tfs) {
                try {
                    const tfCloses = await fetchKlines(currentAsset, tf, 50);
                    const tfAnalysis = analyzeMarket(tfCloses);
                    let sigColor = "#c8ffe8";
                    if (tfAnalysis?.signal?.includes("BUY")) sigColor = "#00ff9f";
                    else if (tfAnalysis?.signal?.includes("SELL")) sigColor = "#ff2d55";
                    mtfHtml += `<div class="mtf-card">
                        <div style="font-size:0.6rem;color:#9bb5b0">${tf}</div>
                        <div style="font-weight:bold;color:${sigColor};margin:4px 0">${tfAnalysis?.signal || "NEUTRAL"}</div>
                        <div style="font-size:0.55rem">RSI:${Math.round(tfAnalysis?.rsi || 50)}</div>
                    </div>`;
                } catch(e) { mtfHtml += `<div class="mtf-card">${tf}<br>error</div>`; }
            }
            document.getElementById("mtfGrid").innerHTML = mtfHtml;
            
            // history
            if (signalText !== "NEUTRAL") {
                const last = historySignals[0];
                if (!last || last.sig !== signalText || (Date.now() - last.time) > 3600000) {
                    historySignals.unshift({
                        time: Date.now(),
                        asset: currentAsset,
                        sig: signalText,
                        price: ticker.price
                    });
                    if (historySignals.length > 10) historySignals.pop();
                }
            }
            const historyHtml = historySignals.map(h => `
                <div class="hist-item">
                    <span>${new Date(h.time).toLocaleTimeString()}</span>
                    <span>${h.asset}</span>
                    <span style="color:${h.sig.includes("BUY")?"#00ff9f":h.sig.includes("SELL")?"#ff2d55":"#c8ffe8"}">${h.sig}</span>
                    <span>$${h.price.toFixed(1)}</span>
                </div>
            `).join("");
            document.getElementById("historyList").innerHTML = historyHtml || "<div style='text-align:center'>—</div>";
            
            document.getElementById("lastUpdate").innerHTML = new Date().toLocaleTimeString();
        } catch(err) {
            console.error(err);
            document.getElementById("signal").innerText = "API ERROR";
            document.getElementById("signal").style.color = "#ff2d55";
        }
    }

    function startCountdown() {
        if (window.countdownInterval) clearInterval(window.countdownInterval);
        countdownValue = 3;
        document.getElementById("countdown").innerText = countdownValue;
        window.countdownInterval = setInterval(() => {
            countdownValue--;
            if (countdownValue < 0) countdownValue = 3;
            document.getElementById("countdown").innerText = countdownValue;
        }, 1000);
    }

    function switchAsset(asset) {
        currentAsset = asset;
        document.querySelectorAll(".asset-btn").forEach(btn => btn.classList.remove("active"));
        document.querySelector(`.asset-btn[data-asset="${asset}"]`).classList.add("active");
        updateDashboard();
    }

    // ═══════════════════════════════════════════════
    //  INIT
    // ═══════════════════════════════════════════════
    document.querySelectorAll(".asset-btn").forEach(btn => {
        btn.addEventListener("click", () => switchAsset(btn.dataset.asset));
    });
    
    updateDashboard();
    startCountdown();
    if (intervalId) clearInterval(intervalId);
    intervalId = setInterval(updateDashboard, 4000);
</script>
</body>
  </html>
